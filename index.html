<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Interactive Receipt</title>

<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body{
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #ffffff;
  font-family: system-ui, monospace;
  touch-action: none;
}
#title{
  position: fixed;
  top: 24px;
  left: 24px;
  color: #333333;
  font-size: 14px;
  font-weight: 500;
  z-index: 10;
}
canvas{
  width: 100%;
  height: 100%;
  display: block;
}
</style>
</head>

<body>
<div id="title">3D Receipt • Drag to interact</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// 核心配置（可微调）
const CONFIG = {
  width: 1.2,
  height: 2.4,
  segX: 20,
  segY: 60,
  gravity: 0.0008, // 重力，控制下垂幅度
  stiffness: 0.98, // 纸张刚度
  damping: 0.99, // 阻尼，控制晃动衰减
  bendStiffness: 0.6, // 弯曲刚度
  iterationCount: 6, // 约束迭代次数，越高越稳定
  maxDragDistance: 0.3, // 最大拖拽幅度
};

// 全局变量
let scene, camera, renderer, receiptMesh;
let particles = [];
let constraints = [];
let isDragging = false;
let dragParticle = null;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

init();
animate();

// 初始化场景
function init() {
  // 场景与相机
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 3.2);

  // 渲染器
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0xffffff, 1);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // 光影系统（打造真实重量感）
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
  scene.add(ambientLight);

  const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
  mainLight.position.set(2, 4, 5);
  mainLight.castShadow = true;
  mainLight.shadow.mapSize.set(2048, 2048);
  scene.add(mainLight);

  const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
  fillLight.position.set(-3, 1, 2);
  scene.add(fillLight);

  const backLight = new THREE.DirectionalLight(0xffffff, 0.3);
  backLight.position.set(0, 0, -3);
  scene.add(backLight);

  // 生成小票纹理（3D术语搞笑购物清单）
  const receiptCanvas = createReceiptTexture();
  const receiptTexture = new THREE.CanvasTexture(receiptCanvas);
  receiptTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();

  // 热敏纸PBR材质
  const material = new THREE.MeshStandardMaterial({
    map: receiptTexture,
    side: THREE.DoubleSide,
    roughness: 0.85,
    metalness: 0,
  });

  // 小票几何体
  const geometry = new THREE.PlaneGeometry(CONFIG.width, CONFIG.height, CONFIG.segX, CONFIG.segY);
  receiptMesh = new THREE.Mesh(geometry, material);
  receiptMesh.castShadow = true;
  receiptMesh.receiveShadow = true;
  scene.add(receiptMesh);

  // 初始化物理系统
  initParticles();
  initConstraints();
  // 初始化交互
  initInteraction();
  // 窗口适配
  window.addEventListener("resize", onWindowResize);
}

// 生成小票纹理
function createReceiptTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 600;
  canvas.height = 1400;
  const ctx = canvas.getContext("2d");

  // 热敏纸底色
  ctx.fillStyle = "#fff9f0";
  ctx.fillRect(0, 0, 600, 1400);

  // 文字样式
  ctx.fillStyle = "#1a1a1a";
  ctx.font = "bold 32px monospace";
  ctx.textAlign = "left";

  // 3D图形术语购物清单
  const lines = [
    { text: "3D GRAPHICS STORE", y: 100, bold: true, align: "center" },
    { text: "--------------------------------", y: 140 },
    { text: "Order #WEBGL2026", y: 180 },
    { text: "Date: 2026-04-03", y: 220 },
    { text: "Cashier: VERLET", y: 260 },
    { text: "--------------------------------", y: 300 },
    { text: "ITEM", y: 340 },
    { text: "QTY  PRICE  TOTAL", y: 340, align: "right" },
    { text: "--------------------------------", y: 370 },
    { text: "Vertex Shader", y: 410 },
    { text: "1x    5.00    5.00", y: 410, align: "right" },
    { text: "Fragment Shader", y: 450 },
    { text: "2x    4.00    8.00", y: 450, align: "right" },
    { text: "Ray Tracing Core", y: 490 },
    { text: "1x  999.00  999.00", y: 490, align: "right" },
    { text: "GPU Threads", y: 530 },
    { text: "4x    3.00   12.00", y: 530, align: "right" },
    { text: "UV Mapping", y: 570 },
    { text: "1x    2.50    2.50", y: 570, align: "right" },
    { text: "Normal Map", y: 610 },
    { text: "1x    3.50    3.50", y: 610, align: "right" },
    { text: "--------------------------------", y: 650 },
    { text: "Coupon: REALTIME10", y: 690 },
    { text: "Discount:        -10.00", y: 730, align: "right" },
    { text: "--------------------------------", y: 770 },
    { text: "SUBTOTAL:      1020.00", y: 810, align: "right" },
    { text: "TAX (5%):        51.00", y: 850, align: "right" },
    { text: "TOTAL:         1071.00", y: 890, bold: true, align: "right" },
    { text: "--------------------------------", y: 930 },
    { text: "Thank you, Developer!", y: 970, align: "center", bold: true },
    { text: "Come back for more polygons!", y: 1010, align: "center" },
  ];

  // 绘制文字
  lines.forEach(line => {
    ctx.font = line.bold ? "bold 26px monospace" : "24px monospace";
    ctx.textAlign = line.align || "left";
    
    let x = 40;
    if (line.align === "right") x = 560;
    if (line.align === "center") x = 300;

    ctx.fillText(line.text, x, line.y);
  });

  return canvas;
}

// 初始化质点系统（核心：顶部整条固定）
function initParticles() {
  const positions = receiptMesh.geometry.attributes.position.array;
  const vertexCount = positions.length / 3;
  const widthSeg = CONFIG.segX;
  const heightSeg = CONFIG.segY;

  for (let i = 0; i < vertexCount; i++) {
    const x = positions[i * 3];
    const y = positions[i * 3 + 1];
    const z = positions[i * 3 + 2];

    // 计算当前质点所在的行列
    const col = i % (widthSeg + 1);
    const row = Math.floor(i / (widthSeg + 1));

    particles.push({
      index: i,
      col: col,
      row: row,
      // 初始锚点
      anchor: new THREE.Vector3(x, y, z),
      // 当前位置
      pos: new THREE.Vector3(x, y, z),
      // 上一帧位置（Verlet积分用）
      prev: new THREE.Vector3(x, y, z),
      // 核心：顶部整排质点全部锁定
      lock: row === 0,
    });
  }
}

// 初始化约束系统
function initConstraints() {
  const widthSeg = CONFIG.segX;
  const heightSeg = CONFIG.segY;

  // 1. 水平结构约束
  for (let row = 0; row <= heightSeg; row++) {
    for (let col = 0; col < widthSeg; col++) {
      const i1 = col + row * (widthSeg + 1);
      const i2 = (col + 1) + row * (widthSeg + 1);
      addConstraint(i1, i2, CONFIG.stiffness);
    }
  }

  // 2. 垂直结构约束
  for (let row = 0; row < heightSeg; row++) {
    for (let col = 0; col <= widthSeg; col++) {
      const i1 = col + row * (widthSeg + 1);
      const i2 = col + (row + 1) * (widthSeg + 1);
      addConstraint(i1, i2, CONFIG.stiffness);
    }
  }

  // 3. 对角约束（防止剪切变形）
  for (let row = 0; row < heightSeg; row++) {
    for (let col = 0; col < widthSeg; col++) {
      const i1 = col + row * (widthSeg + 1);
      const i2 = (col + 1) + (row + 1) * (widthSeg + 1);
      addConstraint(i1, i2, CONFIG.stiffness * 0.7);

      const i3 = (col + 1) + row * (widthSeg + 1);
      const i4 = col + (row + 1) * (widthSeg + 1);
      addConstraint(i3, i4, CONFIG.stiffness * 0.7);
    }
  }

  // 4. 弯曲约束（模拟纸张抗弯曲特性）
  for (let row = 0; row < heightSeg - 1; row++) {
    for (let col = 0; col <= widthSeg; col++) {
      const i1 = col + row * (widthSeg + 1);
      const i2 = col + (row + 2) * (widthSeg + 1);
      addConstraint(i1, i2, CONFIG.bendStiffness);
    }
  }

  for (let row = 0; row <= heightSeg; row++) {
    for (let col = 0; col < widthSeg - 1; col++) {
      const i1 = col + row * (widthSeg + 1);
      const i2 = (col + 2) + row * (widthSeg + 1);
      addConstraint(i1, i2, CONFIG.bendStiffness);
    }
  }
}

// 添加约束
function addConstraint(i1, i2, stiffness) {
  const distance = particles[i1].pos.distanceTo(particles[i2].pos);
  constraints.push({
    p1: particles[i1],
    p2: particles[i2],
    distance: distance,
    stiffness: stiffness,
  });
}

// Verlet物理模拟
function simulate() {
  // 1. 积分更新质点位置
  particles.forEach(p => {
    if (p.lock) return;

    // 计算速度
    const velocity = p.pos.clone().sub(p.prev).multiplyScalar(CONFIG.damping);
    
    // 保存当前位置
    p.prev.copy(p.pos);
    
    // 更新位置 + 重力
    p.pos.add(velocity);
    p.pos.y -= CONFIG.gravity;
  });

  // 2. 迭代求解约束
  for (let i = 0; i < CONFIG.iterationCount; i++) {
    constraints.forEach(c => {
      const p1 = c.p1;
      const p2 = c.p2;

      // 计算距离差
      const delta = p2.pos.clone().sub(p1.pos);
      const currentDistance = delta.length();
      const diff = (currentDistance - c.distance) / currentDistance;

      // 校正位置
      const correction = delta.multiplyScalar(diff * 0.5 * c.stiffness);
      
      if (!p1.lock) p1.pos.add(correction);
      if (!p2.lock) p2.pos.sub(correction);
    });
  }
}

// 更新几何体顶点
function updateGeometry() {
  const positions = receiptMesh.geometry.attributes.position.array;

  particles.forEach(p => {
    const i = p.index * 3;
    positions[i] = p.pos.x;
    positions[i + 1] = p.pos.y;
    positions[i + 2] = p.pos.z;
  });

  receiptMesh.geometry.attributes.position.needsUpdate = true;
  receiptMesh.geometry.computeVertexNormals();
}

// 交互系统
function initInteraction() {
  // 按下/触摸开始
  function onPointerDown(clientX, clientY) {
    mouse.x = (clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    
    const intersects = raycaster.intersectObject(receiptMesh, false);
    if (intersects.length > 0) {
      isDragging = true;
      const hitPoint = receiptMesh.worldToLocal(intersects[0].point.clone());
      
      // 找到最近的质点
      let minDist = Infinity;
      particles.forEach(p => {
        const dist = p.pos.distanceTo(hitPoint);
        if (dist < minDist && !p.lock) {
          minDist = dist;
          dragParticle = p;
        }
      });
    }
  }

  // 移动/触摸滑动
  function onPointerMove(clientX, clientY) {
    if (!isDragging || !dragParticle) return;

    mouse.x = (clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
    const intersectPoint = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, intersectPoint);
    const localPoint = receiptMesh.worldToLocal(intersectPoint.clone());

    // 限制拖拽幅度
    const delta = localPoint.clone().sub(dragParticle.anchor);
    delta.clampLength(0, CONFIG.maxDragDistance);
    
    dragParticle.pos.copy(dragParticle.anchor.clone().add(delta));
  }

  // 松开/触摸结束
  function onPointerUp() {
    isDragging = false;
    dragParticle = null;
  }

  // 鼠标事件
  window.addEventListener("mousedown", e => onPointerDown(e.clientX, e.clientY));
  window.addEventListener("mousemove", e => onPointerMove(e.clientX, e.clientY));
  window.addEventListener("mouseup", onPointerUp);
  window.addEventListener("mouseleave", onPointerUp);

  // 触摸事件
  window.addEventListener("touchstart", e => {
    e.preventDefault();
    onPointerDown(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });

  window.addEventListener("touchmove", e => {
    e.preventDefault();
    onPointerMove(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });

  window.addEventListener("touchend", e => {
    e.preventDefault();
    onPointerUp();
  }, { passive: false });
}

// 窗口适配
function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// 动画循环
function animate() {
  requestAnimationFrame(animate);
  simulate();
  updateGeometry();
  renderer.render(scene, camera);
}

</script>
</body>
</html>
