<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>高质感3D电子小票</title>

<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body{
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
  font-family: system-ui, -apple-system, monospace;
}
#title{
  position: fixed;
  top: 24px;
  left: 24px;
  color: #495057;
  font-size: 14px;
  font-weight: 500;
  z-index: 10;
}
canvas{
  width: 100%;
  height: 100%;
  display: block;
}
</style>
</head>

<body>
<div id="title">3D 电子小票 · 点击拖拽轻微晃动</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// 核心配置（可按需微调）
const CONFIG = {
  width: 1.2,
  height: 2.4,
  thickness: 0.015, // 纸张厚度，越大越厚实
  segX: 12,
  segY: 36,
  stiffness: 0.96, // 纸张挺括度
  damping: 0.93, // 晃动阻尼
  restoreForce: 0.09, // 垂直恢复力
  maxBend: 0.1, // 最大弯曲幅度
  dragSensitivity: 0.04, // 拖拽灵敏度
};

// 全局变量
let scene, camera, renderer;
let frontReceipt, backReceipt, sideGroup;
let particles = [];
let constraints = [];
let isDragging = false;
let dragTarget = null;

init();
animate();

// 初始化场景
function init() {
  // 场景与相机
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 3.5);

  // 渲染器（稳定配置，零报错）
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0xe9ecef, 1);
  document.body.appendChild(renderer.domElement);

  // 稳定光影系统
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
  scene.add(ambientLight);

  const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
  mainLight.position.set(3, 5, 4);
  scene.add(mainLight);

  const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
  fillLight.position.set(-3, 2, 2);
  scene.add(fillLight);

  // 生成小票纹理
  const receiptCanvas = createReceiptTexture();
  const receiptTexture = new THREE.CanvasTexture(receiptCanvas);
  receiptTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();

  // 核心：厚实纸张材质（物理材质，模拟真实纸张）
  const frontMaterial = new THREE.MeshPhysicalMaterial({
    map: receiptTexture,
    side: THREE.FrontSide,
    roughness: 0.78,
    metalness: 0,
    clearcoat: 0.12,
    clearcoatRoughness: 0.8,
  });

  const backMaterial = new THREE.MeshPhysicalMaterial({
    color: 0xfff8ed,
    side: THREE.BackSide,
    roughness: 0.8,
    metalness: 0,
  });

  const sideMaterial = new THREE.MeshPhysicalMaterial({
    color: 0xf5efe4,
    side: THREE.DoubleSide,
    roughness: 0.85,
  });

  // 正面+背面几何体（稳定的PlaneGeometry，不会出现顶点错乱）
  const geometry = new THREE.PlaneGeometry(CONFIG.width, CONFIG.height, CONFIG.segX, CONFIG.segY);
  frontReceipt = new THREE.Mesh(geometry, frontMaterial);
  backReceipt = new THREE.Mesh(geometry.clone(), backMaterial);
  backReceipt.position.z = -CONFIG.thickness;

  // 侧边封口（打造厚度，实现厚实感）
  sideGroup = new THREE.Group();
  createSides(sideGroup, sideMaterial);
  scene.add(sideGroup);

  scene.add(frontReceipt);
  scene.add(backReceipt);

  // 初始化物理系统（预绑定顶点，零匹配错误）
  initParticles();
  initConstraints();
  initInteraction();
  window.addEventListener("resize", onWindowResize);
}

// 生成侧边，打造纸张厚度
function createSides(group, material) {
  const w = CONFIG.width / 2;
  const h = CONFIG.height / 2;
  const t = CONFIG.thickness;

  // 左侧边
  const leftGeo = new THREE.PlaneGeometry(t, CONFIG.height, 1, CONFIG.segY);
  const left = new THREE.Mesh(leftGeo, material);
  left.position.set(-w, 0, -t/2);
  left.rotation.y = Math.PI / 2;
  group.add(left);

  // 右侧边
  const rightGeo = new THREE.PlaneGeometry(t, CONFIG.height, 1, CONFIG.segY);
  const right = new THREE.Mesh(rightGeo, material);
  right.position.set(w, 0, -t/2);
  right.rotation.y = -Math.PI / 2;
  group.add(right);

  // 顶部边
  const topGeo = new THREE.PlaneGeometry(CONFIG.width, t, CONFIG.segX, 1);
  const top = new THREE.Mesh(topGeo, material);
  top.position.set(0, h, -t/2);
  top.rotation.x = -Math.PI / 2;
  group.add(top);

  // 底部边
  const bottomGeo = new THREE.PlaneGeometry(CONFIG.width, t, CONFIG.segX, 1);
  const bottom = new THREE.Mesh(bottomGeo, material);
  bottom.position.set(0, -h, -t/2);
  bottom.rotation.x = Math.PI / 2;
  group.add(bottom);
}

// 生成真实中文小票纹理
function createReceiptTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 600;
  canvas.height = 1200;
  const ctx = canvas.getContext("2d");

  // 纸张底色
  ctx.fillStyle = "#fff8ed";
  ctx.fillRect(0, 0, 600, 1200);

  // 文字样式
  ctx.fillStyle = "#1a1a1a";
  ctx.font = "bold 32px monospace";
  ctx.textAlign = "left";

  // 真实小票内容
  const receiptLines = [
    { text: "社区生活超市", y: 100, bold: true },
    { text: "--------------------------------", y: 140 },
    { text: "单号: 2026040300187", y: 180 },
    { text: "时间: 2026-04-03 17:45", y: 220 },
    { text: "收银员: 003", y: 260 },
    { text: "--------------------------------", y: 300 },
    { text: "商品", y: 340, align: "left" },
    { text: "数量  单价  金额", y: 340, align: "right" },
    { text: "--------------------------------", y: 370 },
    { text: "矿泉水 550ml", y: 410 },
    { text: "2    2.00   4.00", y: 410, align: "right" },
    { text: "全麦吐司", y: 450 },
    { text: "1    6.90   6.90", y: 450, align: "right" },
    { text: "纯牛奶 250ml", y: 490 },
    { text: "12  3.50  42.00", y: 490, align: "right" },
    { text: "抽纸 6包", y: 530 },
    { text: "1   12.90  12.90", y: 530, align: "right" },
    { text: "--------------------------------", y: 570 },
    { text: "商品总数: 16件", y: 610 },
    { text: "合计金额:  65.80", y: 650 },
    { text: "实收金额:  65.80", y: 690, bold: true },
    { text: "支付方式: 微信支付", y: 730 },
    { text: "--------------------------------", y: 770 },
    { text: "欢迎再次光临！", y: 820, align: "center", bold: true },
  ];

  // 绘制文字
  receiptLines.forEach(line => {
    ctx.font = line.bold ? "bold 28px monospace" : "24px monospace";
    ctx.textAlign = line.align || "left";
    
    let x = 40;
    if (line.align === "right") x = 560;
    if (line.align === "center") x = 300;

    ctx.fillText(line.text, x, line.y);
  });

  return canvas;
}

// 初始化质点系统（预绑定顶点索引，零匹配错误）
function initParticles() {
  const positions = frontReceipt.geometry.attributes.position.array;
  const vertexCount = positions.length / 3;

  for (let i = 0; i < vertexCount; i++) {
    const x = positions[i * 3];
    const y = positions[i * 3 + 1];
    const z = positions[i * 3 + 2];

    particles.push({
      index: i,
      // 初始锚点（用于恢复垂直）
      anchor: new THREE.Vector3(x, y, z),
      // 当前位置
      pos: new THREE.Vector3(x, y, z),
      // 上一帧位置
      prev: new THREE.Vector3(x, y, z),
    });
  }
}

// 初始化约束系统（保证纸张挺括，不翻转）
function initConstraints() {
  const segX = CONFIG.segX;
  const segY = CONFIG.segY;

  // 水平约束
  for (let y = 0; y <= segY; y++) {
    for (let x = 0; x < segX; x++) {
      const i1 = x + y * (segX + 1);
      const i2 = (x + 1) + y * (segX + 1);
      addConstraint(i1, i2);
    }
  }

  // 垂直约束
  for (let y = 0; y < segY; y++) {
    for (let x = 0; x <= segX; x++) {
      const i1 = x + y * (segX + 1);
      const i2 = x + (y + 1) * (segX + 1);
      addConstraint(i1, i2);
    }
  }

  // 对角约束（防止变形翻转）
  for (let y = 0; y < segY; y++) {
    for (let x = 0; x < segX; x++) {
      const i1 = x + y * (segX + 1);
      const i2 = (x + 1) + (y + 1) * (segX + 1);
      addConstraint(i1, i2);
      
      const i3 = (x + 1) + y * (segX + 1);
      const i4 = x + (y + 1) * (segX + 1);
      addConstraint(i3, i4);
    }
  }
}

// 添加约束
function addConstraint(i1, i2) {
  const distance = particles[i1].pos.distanceTo(particles[i2].pos);
  constraints.push({
    p1: particles[i1],
    p2: particles[i2],
    distance: distance,
  });
}

// 物理模拟
function simulate() {
  // Verlet积分
  particles.forEach(p => {
    const velocity = p.pos.clone().sub(p.prev).multiplyScalar(CONFIG.damping);
    p.prev.copy(p.pos);
    p.pos.add(velocity);

    // 核心：垂直恢复力，自然保持垂直，不锁死点位
    const restoreForce = p.anchor.clone().sub(p.pos).multiplyScalar(CONFIG.restoreForce);
    p.pos.add(restoreForce);

    // 硬限制：彻底杜绝翻转
    p.pos.z = THREE.MathUtils.clamp(p.pos.z, -CONFIG.maxBend, CONFIG.maxBend);
  });

  // 约束迭代
  const iterations = 4;
  for (let i = 0; i < iterations; i++) {
    constraints.forEach(c => {
      const p1 = c.p1;
      const p2 = c.p2;
      
      const delta = p2.pos.clone().sub(p1.pos);
      const currentDistance = delta.length();
      const diff = (currentDistance - c.distance) / currentDistance;
      
      const correction = delta.multiplyScalar(diff * CONFIG.stiffness * 0.5);
      p1.pos.add(correction);
      p2.pos.sub(correction);
    });
  }
}

// 更新几何体顶点（稳定同步，零错乱）
function updateGeometry() {
  const frontPositions = frontReceipt.geometry.attributes.position.array;
  const backPositions = backReceipt.geometry.attributes.position.array;

  // 同步正面+背面顶点，保证厚度一致
  particles.forEach(p => {
    const i = p.index * 3;
    // 更新正面
    frontPositions[i] = p.pos.x;
    frontPositions[i + 1] = p.pos.y;
    frontPositions[i + 2] = p.pos.z;
    // 更新背面（同步偏移，保持厚度）
    backPositions[i] = p.pos.x;
    backPositions[i + 1] = p.pos.y;
    backPositions[i + 2] = p.pos.z - CONFIG.thickness;
  });

  // 标记更新
  frontReceipt.geometry.attributes.position.needsUpdate = true;
  backReceipt.geometry.attributes.position.needsUpdate = true;
  frontReceipt.geometry.computeVertexNormals();
  backReceipt.geometry.computeVertexNormals();

  // 同步侧边顶点（跟随弯曲）
  updateSides();
}

// 同步侧边弯曲
function updateSides() {
  const segY = CONFIG.segY;
  const segX = CONFIG.segX;
  const w = CONFIG.width / 2;
  const h = CONFIG.height / 2;

  // 左侧边同步
  const leftGeo = sideGroup.children[0].geometry;
  const leftPositions = leftGeo.attributes.position.array;
  for (let y = 0; y <= segY; y++) {
    const particleIndex = 0 + y * (segX + 1);
    const p = particles[particleIndex];
    const i1 = y * 2 * 3;
    const i2 = (y * 2 + 1) * 3;
    leftPositions[i1 + 1] = p.pos.y;
    leftPositions[i2 + 1] = p.pos.y;
    leftPositions[i1 + 2] = p.pos.z;
    leftPositions[i2 + 2] = p.pos.z - CONFIG.thickness;
  }
  leftGeo.attributes.position.needsUpdate = true;

  // 右侧边同步
  const rightGeo = sideGroup.children[1].geometry;
  const rightPositions = rightGeo.attributes.position.array;
  for (let y = 0; y <= segY; y++) {
    const particleIndex = segX + y * (segX + 1);
    const p = particles[particleIndex];
    const i1 = y * 2 * 3;
    const i2 = (y * 2 + 1) * 3;
    rightPositions[i1 + 1] = p.pos.y;
    rightPositions[i2 + 1] = p.pos.y;
    rightPositions[i1 + 2] = p.pos.z;
    rightPositions[i2 + 2] = p.pos.z - CONFIG.thickness;
  }
  rightGeo.attributes.position.needsUpdate = true;
}

// 交互系统
function initInteraction() {
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  function onPointerDown(x, y) {
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    
    const intersects = raycaster.intersectObject(frontReceipt);
    if (intersects.length > 0) {
      isDragging = true;
      const hitPoint = intersects[0].point;
      let minDistance = Infinity;
      
      particles.forEach(p => {
        const worldPos = frontReceipt.localToWorld(p.pos.clone());
        const distance = worldPos.distanceTo(hitPoint);
        if (distance < minDistance) {
          minDistance = distance;
          dragTarget = p;
        }
      });
    }
  }

  function onPointerMove(x, y) {
    if (!isDragging || !dragTarget) return;
    
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    
    const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
    const intersectPoint = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, intersectPoint);
    
    // 限制拖拽幅度
    const delta = intersectPoint.clone().sub(dragTarget.anchor);
    delta.multiplyScalar(CONFIG.dragSensitivity);
    
    dragTarget.pos.copy(dragTarget.anchor.clone().add(delta));
  }

  function onPointerUp() {
    isDragging = false;
    dragTarget = null;
  }

  // 鼠标事件
  window.addEventListener("mousedown", e => onPointerDown(e.clientX, e.clientY));
  window.addEventListener("mousemove", e => onPointerMove(e.clientX, e.clientY));
  window.addEventListener("mouseup", onPointerUp);
  window.addEventListener("mouseleave", onPointerUp);

  // 触摸事件
  window.addEventListener("touchstart", e => {
    e.preventDefault();
    onPointerDown(e.touches[0].clientX, e.touches[0].clientY);
  });
  window.addEventListener("touchmove", e => {
    e.preventDefault();
    onPointerMove(e.touches[0].clientX, e.touches[0].clientY);
  });
  window.addEventListener("touchend", e => {
    e.preventDefault();
    onPointerUp();
  });
}

// 窗口适配
function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// 动画循环
function animate() {
  requestAnimationFrame(animate);
  simulate();
  updateGeometry();
  renderer.render(scene, camera);
}

</script>
</body>
</html>
