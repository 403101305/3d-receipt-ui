<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Receipt UI</title>

<style>

body{
margin:0;
overflow:hidden;
background:#ffffff;
font-family:-apple-system,BlinkMacSystemFont;
}

#ui{
position:fixed;
top:20px;
left:20px;
color:#444;
font-size:14px;
}

canvas{
display:block;
}

</style>

</head>

<body>

<div id="ui">
3D Receipt • Drag Paper
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>

let scene,camera,renderer
let receiptMesh,geometry
let particles=[]
let constraints=[]

const SEG_X=20
const SEG_Y=60
const WIDTH=1
const HEIGHT=2

init()
animate()

function init(){

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
100
)

camera.position.set(0,0,3)

renderer=new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)



// lights

scene.add(new THREE.AmbientLight(0xffffff,.6))

const light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(3,4,3)

scene.add(light)



// geometry

geometry=new THREE.PlaneGeometry(
WIDTH,
HEIGHT,
SEG_X,
SEG_Y
)

const material=new THREE.MeshStandardMaterial({
color:0xfffdf3,
roughness:.9,
metalness:0,
side:THREE.DoubleSide
})

receiptMesh=new THREE.Mesh(geometry,material)

scene.add(receiptMesh)



initParticles()
initConstraints()

window.addEventListener("resize",resize)

initMouse()

}



function initParticles(){

for(let y=0;y<=SEG_Y;y++){

for(let x=0;x<=SEG_X;x++){

let px=(x/SEG_X-.5)*WIDTH
let py=HEIGHT/2-y/SEG_Y*HEIGHT

particles.push({

pos:new THREE.Vector3(px,py,0),
prev:new THREE.Vector3(px,py,0),
lock:y===0

})

}

}

}



function index(x,y){
return x+(SEG_X+1)*y
}



function connect(a,b){

let dist=particles[a].pos.distanceTo(particles[b].pos)

constraints.push({a,b,dist})

}



function initConstraints(){

for(let y=0;y<=SEG_Y;y++){

for(let x=0;x<=SEG_X;x++){

if(x<SEG_X) connect(index(x,y),index(x+1,y))

if(y<SEG_Y) connect(index(x,y),index(x,y+1))

}

}

}



function simulate(){

particles.forEach(p=>{

if(p.lock)return

let vel=p.pos.clone().sub(p.prev)

p.prev.copy(p.pos)

p.pos.add(vel)

})



for(let i=0;i<4;i++){

constraints.forEach(c=>{

let p1=particles[c.a]
let p2=particles[c.b]

let diff=new THREE.Vector3().subVectors(p2.pos,p1.pos)

let d=diff.length()

let err=(d-c.dist)/d

if(!p1.lock)
p1.pos.add(diff.clone().multiplyScalar(.5*err))

if(!p2.lock)
p2.pos.sub(diff.clone().multiplyScalar(.5*err))

})

}

}



function updateMesh(){

const pos=geometry.attributes.position

let i=0

for(let y=0;y<=SEG_Y;y++){

for(let x=0;x<=SEG_X;x++){

let p=particles[index(x,y)]

pos.setXYZ(i,p.pos.x,p.pos.y,p.pos.z)

i++

}

}

pos.needsUpdate=true

geometry.computeVertexNormals()

}



function animate(){

requestAnimationFrame(animate)

simulate()

updateMesh()

renderer.render(scene,camera)

}



function resize(){

camera.aspect=window.innerWidth/window.innerHeight

camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

}



// mouse interaction

let ray=new THREE.Raycaster()
let mouse=new THREE.Vector2()
let grabbed=null

function initMouse(){

window.addEventListener("mousedown",e=>{

mouse.x=e.clientX/window.innerWidth*2-1
mouse.y=-(e.clientY/window.innerHeight)*2+1

ray.setFromCamera(mouse,camera)

let hit=ray.intersectObject(receiptMesh)

if(hit.length){

let min=1e9

particles.forEach(p=>{

let d=p.pos.distanceTo(hit[0].point)

if(d<min){

min=d
grabbed=p

}

})

}

})



window.addEventListener("mouseup",()=>grabbed=null)



window.addEventListener("mousemove",e=>{

if(!grabbed)return

mouse.x=e.clientX/window.innerWidth*2-1
mouse.y=-(e.clientY/window.innerHeight)*2+1

ray.setFromCamera(mouse,camera)

let plane=new THREE.Plane(new THREE.Vector3(0,0,1),0)

let pos=new THREE.Vector3()

ray.ray.intersectPlane(plane,pos)

grabbed.pos.copy(pos)

})

}

</script>

</body>
</html>
