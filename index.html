<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Receipt UI</title>

<style>

body{
margin:0;
overflow:hidden;
background:#f5f5f5;
font-family:monospace;
}

#title{
position:fixed;
top:20px;
left:20px;
color:#333;
font-size:14px;
}

canvas{
display:block;
}

</style>
</head>

<body>

<div id="title">
3D Receipt • drag / touch
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

let scene,camera,renderer
let receipt,geometry

const SEGX=20
const SEGY=70

let particles=[]
let constraints=[]

init()
animate()

function init(){

scene=new THREE.Scene()



camera=new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
100
)

camera.position.set(0,0,3)



renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:false
})

renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)



// lighting

scene.add(new THREE.AmbientLight(0xffffff,.7))

let light=new THREE.DirectionalLight(0xffffff,.9)
light.position.set(3,5,3)

scene.add(light)



// receipt texture

let canvas=document.createElement("canvas")
canvas.width=512
canvas.height=1024

let ctx=canvas.getContext("2d")

ctx.fillStyle="#fff8e8"
ctx.fillRect(0,0,512,1024)

ctx.fillStyle="#111"
ctx.font="24px monospace"

let lines=[

"3D GRAPHICS STORE",
"",
"1x Vertex Shader .... $5",
"2x Fragment Shader .. $8",
"1x Ray Tracing ...... $999",
"4x GPU Threads ...... $12",
"",
"Coupon: REALTIME10",
"",
"TOTAL .............. $1024",
"",
"Thank you developer!"

]

lines.forEach((t,i)=>{

ctx.fillText(t,40,80+i*40)

})

let texture=new THREE.CanvasTexture(canvas)



// geometry

geometry=new THREE.PlaneGeometry(
1,
2,
SEGX,
SEGY
)



let material=new THREE.MeshBasicMaterial({
map:texture,
side:THREE.DoubleSide
})

receipt=new THREE.Mesh(geometry,material)

scene.add(receipt)



initParticles()
initConstraints()
initInteraction()

window.addEventListener("resize",resize)

}



function idx(x,y){
return x+(SEGX+1)*y
}



function initParticles(){

for(let y=0;y<=SEGY;y++){
for(let x=0;x<=SEGX;x++){

let px=(x/SEGX-.5)
let py=1-y/SEGY*2

particles.push({
pos:new THREE.Vector3(px,py,0),
prev:new THREE.Vector3(px,py,0),
lock:y===0
})

}
}

}



function connect(a,b){

let d=particles[a].pos.distanceTo(particles[b].pos)

constraints.push({a,b,d})

}



function initConstraints(){

for(let y=0;y<=SEGY;y++){
for(let x=0;x<=SEGX;x++){

if(x<SEGX)connect(idx(x,y),idx(x+1,y))
if(y<SEGY)connect(idx(x,y),idx(x,y+1))

}
}

}



function simulate(){

particles.forEach(p=>{

if(p.lock)return

let vel=p.pos.clone().sub(p.prev)

p.prev.copy(p.pos)

p.pos.add(vel)

// subtle natural paper movement

p.pos.z += Math.sin(Date.now()*0.002+p.pos.y*4)*0.001

})



for(let i=0;i<4;i++){

constraints.forEach(c=>{

let p1=particles[c.a]
let p2=particles[c.b]

let diff=new THREE.Vector3().subVectors(p2.pos,p1.pos)

let dist=diff.length()

let err=(dist-c.d)/dist

if(!p1.lock)
p1.pos.add(diff.clone().multiplyScalar(.5*err))

if(!p2.lock)
p2.pos.sub(diff.clone().multiplyScalar(.5*err))

})

}

}



function updateMesh(){

let pos=geometry.attributes.position

let i=0

for(let y=0;y<=SEGY;y++){
for(let x=0;x<=SEGX;x++){

let p=particles[idx(x,y)]

pos.setXYZ(i,p.pos.x,p.pos.y,p.pos.z)

i++

}
}

pos.needsUpdate=true

geometry.computeVertexNormals()

}



function animate(){

requestAnimationFrame(animate)

simulate()
updateMesh()

renderer.render(scene,camera)

}



function resize(){

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

}



// interaction (mouse + touch)

let ray=new THREE.Raycaster()
let mouse=new THREE.Vector2()
let grab=null



function startInteraction(x,y){

mouse.x=x/window.innerWidth*2-1
mouse.y=-(y/window.innerHeight)*2+1

ray.setFromCamera(mouse,camera)

let hit=ray.intersectObject(receipt)

if(hit.length){

let min=1e9

particles.forEach(p=>{

let d=p.pos.distanceTo(hit[0].point)

if(d<min){

min=d
grab=p

}

})

}

}



function moveInteraction(x,y){

if(!grab)return

mouse.x=x/window.innerWidth*2-1
mouse.y=-(y/window.innerHeight)*2+1

ray.setFromCamera(mouse,camera)

let plane=new THREE.Plane(new THREE.Vector3(0,0,1),0)

let pos=new THREE.Vector3()

ray.ray.intersectPlane(plane,pos)

grab.pos.copy(pos)

}



function endInteraction(){

grab=null

}



function initInteraction(){

// mouse

window.addEventListener("mousedown",e=>{
startInteraction(e.clientX,e.clientY)
})

window.addEventListener("mousemove",e=>{
moveInteraction(e.clientX,e.clientY)
})

window.addEventListener("mouseup",endInteraction)


// touch

window.addEventListener("touchstart",e=>{
let t=e.touches[0]
startInteraction(t.clientX,t.clientY)
})

window.addEventListener("touchmove",e=>{
let t=e.touches[0]
moveInteraction(t.clientX,t.clientY)
})

window.addEventListener("touchend",endInteraction)

}

</script>

</body>
</html>
